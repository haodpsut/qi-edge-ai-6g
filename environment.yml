# Single-channel conda env to avoid libmamba SOLVER_RULE_STRICT_REPO_PRIORITY.
# PyTorch (with CUDA 12.1) is installed via pip from the official PyTorch index.
# This is the recommended pattern when conda-forge / pytorch / nvidia channels
# disagree on package priority.
name: qi-edge-ai-6g
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy=1.26.*
  - scipy=1.13.*
  - scikit-learn=1.5.*
  - pandas=2.2.*
  - matplotlib=3.9.*
  - pyyaml
  - tqdm
  - pyarrow=16.*
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.3.1
      - fvcore==0.1.5.post20221221
      - thop==0.1.1.post2209072238
      - kaggle==1.6.17
